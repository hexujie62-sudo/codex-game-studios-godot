# Workflow Catalog
# Used by /help to determine where a user is and what comes next.
#
# Artifact checks:
#   glob: file glob pattern — complete if ≥1 file matches (or min_count)
#   pattern: text pattern that must appear in the file (checked after glob)
#   min_count: minimum matching files required (default: 1)
#   note: human-readable fallback when completion can't be auto-detected
#
# required: true → blocks progression to next phase (shown as REQUIRED)
# required: false → optional enhancement (shown as OPTIONAL)
# repeatable: true → runs multiple times (one per system, work order, etc.)
#
# Phase gates (/gate-check): verdicts are ADVISORY — they guide the decision
# but never hard-block advancement. The user always decides whether to proceed.

phases:

  concept:
    label: "Concept"
    description: "Develop your game idea into a documented concept"
    next_phase: systems-design
    steps:
      - id: brainstorm
        name: "Brainstorm"
        command: /brainstorm
        required: false
        description: "Explore the game concept using MDA, verb-first, and player psychology frameworks"

      - id: engine-setup
        name: "Engine Setup"
        command: /setup-engine
        required: true
        artifact:
          glob: ".codex/docs/technical-preferences.md"
          pattern: "Engine: [^[]"
        description: "Configure engine, pin version, set naming conventions and performance budgets"

      - id: game-concept
        name: "Game Concept Document"
        command: /brainstorm
        required: true
        artifact:
          glob: "design/gdd/game-concept.md"
        description: "Formalize concept with pillars, MDA analysis, and scope tiers"

      - id: design-review-concept
        name: "Concept Review"
        command: /design-system
        required: false
        description: "Validate the game concept (recommended before proceeding)"

      - id: art-bible
        name: "Art Bible"
        command: /art-bible
        required: true
        artifact:
          glob: "design/art/art-bible.md"
        description: "Author the visual identity specification (9 sections). Uses the Visual Identity Anchor produced by /brainstorm. Run after game concept is formed, before systems design."

      - id: map-systems
        name: "Systems Map"
        command: /design-system
        required: true
        artifact:
          glob: "design/gdd/systems-index.md"
        description: "Decompose concept into systems with dependency ordering and priority tiers"

  systems-design:
    label: "Systems Design"
    description: "Author a GDD for each system in the systems index"
    next_phase: technical-setup
    steps:
      - id: design-system
        name: "System GDDs"
        command: /design-system
        required: true
        repeatable: true
        artifact:
          note: "Check design/gdd/systems-index.md — each MVP system needs Status: Approved"
        description: "Author per-system GDDs (guided, section-by-section). Run once per system."

      - id: design-review
        name: "Per-System Design Review"
        command: /design-system
        required: true
        repeatable: true
        description: "Validate each GDD (8 required sections, no MAJOR REVISION verdict). Run per system."

      - id: review-all-gdds
        name: "Cross-GDD Review"
        command: /design-system
        required: true
        artifact:
          glob: "design/gdd/gdd-cross-review-*.md"
        description: "Holistic consistency check + design theory review across all GDDs simultaneously"

      - id: consistency-check
        name: "Consistency Check"
        command: /design-system
        required: false
        repeatable: true
        description: "Scan all GDDs for contradictions, undefined references, and mechanic conflicts. Run after /design-system, and again any time a GDD is added or revised mid-project."

  technical-setup:
    label: "Technical Setup"
    description: "Architecture decisions, artifact lifecycle, accessibility foundations, engine validation"
    next_phase: pre-production
    steps:
      - id: create-architecture
        name: "Architecture Boundary Package"
        command: /create-architecture
        required: true
        artifact:
          note: "Check docs/architecture/ only when architecture has named consumers; otherwise /create-architecture may return CONCERNS/BLOCKED instead of writing."
        description: "Define architecture boundaries, owners, consumers, and outputs before implementation. Write only architecture artifacts that will be consumed by B-dev, code-review, gate-check, or named work orders."

      - id: architecture-decision
        name: "Architecture Decisions (ADRs)"
        command: /create-architecture
        required: false
        repeatable: true
        artifact:
          glob: "docs/architecture/adr-*.md"
        description: "Document technical decisions as ADRs only when an implementation, review, or work order will consume the decision."

      - id: architecture-review
        name: "Architecture Review"
        command: /create-architecture
        required: false
        artifact:
          glob: "docs/architecture/create-architecture-*.md"
        description: "Validate coverage, dependency ordering, engine compatibility, and stale generated architecture artifacts when risk warrants it."

      - id: control-manifest
        name: "Control Manifest"
        command: /create-architecture
        required: false
        artifact:
          glob: "docs/architecture/control-manifest.md"
        description: "Flat programmer rules sheet generated from Accepted ADRs only when B-dev, code-review, gate-check, or a named work order will consume it."

      - id: accessibility-doc
        name: "Accessibility Requirements"
        required: true
        artifact:
          glob: "design/accessibility-requirements.md"
        description: "Commit accessibility tier (Basic/Standard/Comprehensive/Exemplary) and feature matrix. UX specs (Phase 4) reference this tier."

  pre-production:
    label: "Pre-Production"
    description: "Visual entity inventory, UX specs, asset specs, prototype the core mechanic, and prepare work-order validation scope"
    next_phase: production
    steps:
      - id: entity-inventory
        name: "Visual Entity & Screen Inventory"
        command: /art-bible
        required: false
        artifact:
          glob: "design/assets/entity-inventory.md"
        description: "Enumerate everything the game needs visually: entities (characters, enemies, buildings, environment pieces), UI screens, HUD elements, panels. Run /art-bible with no arguments to start a collaborative inventory session — brief or detailed based on your responses. Reads GDDs and art bible to propose a starting list; you add, remove, and adjust. Becomes the source of truth for all art and UX work. Not required if the game has very few distinct visual elements."

      - id: asset-spec
        name: "Asset Specs"
        command: /art-bible
        required: false
        repeatable: true
        artifact:
          glob: "design/assets/asset-manifest.md"
        description: "Generate per-asset visual specifications and AI generation prompts. Run once per entity, system, level, or character. If no source doc exists, /art-bible interviews you inline — no narrative document required."

      - id: ux-design
        name: "UX Specs (key screens)"
        command: /art-bible
        required: true
        repeatable: true
        artifact:
          glob: "design/ux/*.md"
          min_count: 3
        description: "Author UX specs for the screens identified in the entity inventory (or GDDs if no inventory). Minimum required: main menu, core gameplay HUD, pause menu. Add more screens as the inventory identifies them. Reads input method and platform from technical-preferences.md."

      - id: ux-review
        name: "UX Review"
        command: /art-bible
        required: true
        description: "Validate all key screen UX specs for GDD alignment and accessibility tier compliance before writing production work orders."

      - id: prototype
        name: "Prototype"
        command: /brainstorm
        required: false
        artifact:
          glob: "prototypes/*/README.md"
          min_count: 1
        description: "Build a throwaway prototype to validate the core mechanic is fun before committing to full production. Recommended for first-time mechanics or high-risk design decisions. Solo devs with proven concepts may skip."

      - id: test-setup
        name: "Test Framework Setup"
        command: /setup-engine
        required: false
        artifact:
          note: "Check tests/ directory for engine-specific test framework scaffold"
        description: "Scaffold the Godot test foundation used by B-dev runtime checks and work-order evidence."

      - id: work-order-readiness
        name: "Work Order Readiness"
        command: /window-cfg
        required: true
        artifact:
          glob: "production/work-orders/*.md"
          min_count: 1
        description: "Ensure production work is expressed as work orders with Scope, Non-scope, Delivery Spec, owner lane, and stop conditions."

      - id: vertical-slice
        name: "Vertical Slice"
        command: /gate-check
        required: false
        artifact:
          glob: "prototypes/*/REPORT.md"
          min_count: 1
        description: "Build and playtest a vertical slice — a complete end-to-end pass through the core loop. Recommended before committing work-order production. Skipping is a valid solo dev call but increases risk of late-stage design pivots. If built, must be played and documented before advancing."

  production:
    label: "Production"
    description: "Work-order-driven feature development through A/B/C/D lanes"
    next_phase: polish
    steps:
      - id: work-order-queue
        name: "Work Order Queue"
        command: /window-cfg
        required: true
        artifact:
          glob: "production/session-state/active.md"
        description: "A-producer keeps the active work-order queue and current focus in active.md; lane files hold execution handoff state."

      - id: execute-work-orders
        name: "Execute Work Orders"
        command: /window-cfg
        required: true
        repeatable: true
        artifact:
          note: "Check production/session-state/windows/*.md for assigned work orders and handoff evidence."
        description: "Recover the owning lane, read the assigned work order/verdict, execute only that lane's section, then update lane handoff."

      - id: code-review
        name: "Code Review"
        command: /code-review
        required: false
        repeatable: true
        description: "Review code quality and architecture drift for B-dev implementation work when risk or changed files warrant it."

      - id: bug-report
        name: "Bug Report / Triage"
        command: /bug-report
        required: false
        repeatable: true
        description: "Log and prioritize bugs found during implementation. /bug-report creates a structured report; /bug-report prioritizes the open backlog."

      - id: team-feature
        name: "Team Orchestration (optional)"
        required: false
        repeatable: true
        description: "Coordinate through A-producer and work orders when a feature spans B-dev, C-art, D-director, or Z-platform domains."

  polish:
    label: "Polish"
    description: "Performance, balance, playtesting, bug fixing"
    next_phase: release
    steps:
      - id: perf-profile
        name: "Performance Profile"
        command: /code-review
        required: false
        description: "Profile and optimize CPU/GPU/memory bottlenecks"

      - id: balance-check
        name: "Balance Check"
        command: /design-system
        required: false
        description: "Analyze game balance formulas and data for outliers and broken progressions"

      - id: asset-audit
        name: "Asset Audit"
        command: /art-bible
        required: false
        description: "Verify naming conventions, file format standards, and size budgets"

      - id: playtest-polish
        name: "Playtest Sessions (×3)"
        command: /gate-check
        required: true
        artifact:
          glob: "production/playtests/*.md"
          min_count: 3
        description: "Cover player experience, readability, difficulty, and remaining D-director concerns."

      - id: team-polish
        name: "Polish Team Pass"
        command: /window-cfg
        required: true
        description: "Coordinate polish through lane-owned work orders and D-director verdicts."

  release:
    label: "Release"
    description: "Launch preparation, certification, and ship"
    next_phase: null
    steps:
      - id: release-checklist
        name: "Release Checklist"
        command: /release-checklist
        required: true
        description: "Pre-release validation across all departments: code, content, store, legal"

      - id: patch-notes
        name: "Patch Notes"
        command: /release-checklist
        required: false
        description: "Generate player-facing patch notes from git history and accepted work-order/release data"

      - id: changelog
        name: "Changelog"
        command: /release-checklist
        required: false
        description: "Auto-generate internal changelog from commits, work orders, release notes, and design docs"

      - id: launch-checklist
        name: "Launch Checklist"
        command: /release-checklist
        required: true
        description: "Final launch readiness — last gate before shipping to players"


