schema_version: 2
purpose: "给 /help 和 /skill-create-ccgs 使用的精简 Skill 路由索引。当前体系只保留少量核心 Skill，旧 CCGS 细 Skill 作为别名和吸收职责存在。"

stable_constraints:
  ecosystem: "Codex-only"
  engine_family: "Godot"
  developer_mode: "AI full-chain developer"
  route_problem: "用户不会手动挑选大量命令；/help 必须给一个可解释的核心入口，而不是暴露完整工具清单。"

mutable_design_fields:
  rule: "以下字段只能从当前工件读取，不能写成常驻路由前提。"
  fields:
    - "2D / 3D / mixed"
    - "美术风格"
    - "视角与镜头"
    - "题材、类型、核心循环"
    - "输入方式与目标平台"
    - "当前性能预算与资源规格"
  sources:
    - "AGENTS.md"
    - ".codex/docs/technical-preferences.md"
    - "design/gdd/game-concept.md"
    - "design/gdd/systems-index.md"
    - "design/art/art-bible.md"
    - "design/ux/*.md"

routing_rules:
  - "只推荐 .agents/skills/ 中真实存在的核心 Skill。"
  - "用户说旧命令名时，按 alias_routes 转译到核心 Skill。"
  - "推荐时只给一个 primary command；必要时最多给 1-2 个辅助 command。"
  - "Godot 是稳定约束；具体版本、2D/3D、输入方式和美术风格必须读取当前项目工件确认。"
  - "核心 Skill 可以更长，但必须保持用户入口少、动线清楚、职责边界明确。"

visibility_meaning:
  core: "可以作为 /help 的主推荐，也是 / 菜单中应保留的真实 Skill。"
  absorbed: "旧 Skill 已归并；不应作为用户入口出现。"

core_skills:
  - name: start
    group: orientation
    stage: support
    visibility: core
    why: "首次引导、旧项目接入和阶段定位入口；默认 Lean，降低启动心智负担。"
    absorbs: [adopt, project-stage-detect, reverse-document]
  - name: help
    group: orientation
    stage: support
    visibility: core
    why: "日常导航入口；读取 workflow catalog、route index 和窗口状态后给一个下一步。"
    absorbs: [onboard, project-stage-detect]
  - name: window-ccgs
    group: maintenance
    stage: support
    visibility: core
    why: "多窗口唯一入口；启动、恢复、更新、交接、审计、压缩、checkpoint 建议、research worktree 和 clean-only merge。"
    absorbs: [window-start-ccgs, window-handoff-ccgs]
  - name: skill-create-ccgs
    group: maintenance
    stage: support
    visibility: core
    why: "Skill 新增、修改、合并、删除、测试和动线接入的唯一治理入口。"
    absorbs: [skill-test, skill-improve, skill-creator]

  - name: setup-engine
    group: architecture
    stage: concept
    visibility: core
    why: "固定 Godot 版本、语言、工具路径和测试环境基础。"
    absorbs: [test-setup]
  - name: brainstorm
    group: design
    stage: concept
    visibility: core
    why: "游戏概念、核心循环和原型方向入口。"
    absorbs: [prototype]
  - name: design-system
    group: design
    stage: systems-design
    visibility: core
    why: "系统设计/GDD 主入口；同时吸收系统映射、轻量设计、一致性和平衡检查。"
    absorbs: [map-systems, quick-design, design-review, review-all-gdds, consistency-check, balance-check, propagate-design-change]
  - name: art-bible
    group: design
    stage: concept
    visibility: core
    why: "视觉、资产、UX 和资源规格主入口。"
    absorbs: [asset-spec, asset-audit, content-audit, ux-design, ux-review, team-ui, team-audio]
  - name: create-architecture
    group: architecture
    stage: technical-setup
    visibility: core
    why: "Godot 架构、ADR、架构审查和控制清单入口。"
    absorbs: [architecture-decision, architecture-review, create-control-manifest]

  - name: sprint-plan
    group: planning
    stage: production
    visibility: core
    why: "Epic、Story、Sprint、估算、范围、状态和复盘入口。"
    absorbs: [create-epics, create-stories, estimate, sprint-status, scope-check, retrospective]
  - name: dev-story
    group: implementation
    stage: production
    visibility: core
    why: "读取 Story、执行实施，并在实施前做最小 readiness preflight。"
    absorbs: [story-readiness, team-combat, team-level, team-narrative]
  - name: story-done
    group: implementation
    stage: production
    visibility: core
    why: "故事完成验证、验收标准、偏差和测试证据收口。"
    absorbs: [test-evidence-review]
  - name: code-review
    group: implementation
    stage: production
    visibility: core
    why: "代码质量、架构偏差、技术债、安全和性能轻审入口。"
    absorbs: [tech-debt, perf-profile, security-audit]
  - name: smoke-check
    group: qa
    stage: production
    visibility: core
    why: "QA、冒烟、回归、测试证据、长测和试玩反馈入口。"
    absorbs: [qa-plan, regression-suite, test-helpers, test-flakiness, playtest-report, soak-test, team-qa, team-polish]
  - name: bug-report
    group: qa
    stage: production
    visibility: core
    why: "缺陷记录、复现、分级和修复分流入口。"
    absorbs: [bug-triage, hotfix]
  - name: gate-check
    group: qa
    stage: support
    visibility: core
    why: "阶段推进、里程碑和预生产验证的 PASS/CONCERNS/FAIL 把关入口。"
    absorbs: [milestone-review, vertical-slice]
  - name: release-checklist
    group: release
    stage: release
    visibility: core
    why: "发布、上线、变更日志、补丁说明、本地化和首日补丁收口入口。"
    absorbs: [changelog, patch-notes, launch-checklist, day-one-patch, localize, team-release, team-live-ops]

alias_routes:
  adopt: start
  project-stage-detect: help
  reverse-document: start
  onboard: help
  window-start-ccgs: window-ccgs
  window-handoff-ccgs: window-ccgs

  prototype: brainstorm
  map-systems: design-system
  quick-design: design-system
  design-review: design-system
  review-all-gdds: design-system
  consistency-check: design-system
  balance-check: design-system
  propagate-design-change: design-system

  asset-spec: art-bible
  asset-audit: art-bible
  content-audit: art-bible
  ux-design: art-bible
  ux-review: art-bible
  team-ui: art-bible
  team-audio: art-bible

  architecture-decision: create-architecture
  architecture-review: create-architecture
  create-control-manifest: create-architecture

  create-epics: sprint-plan
  create-stories: sprint-plan
  estimate: sprint-plan
  sprint-status: sprint-plan
  scope-check: sprint-plan
  retrospective: sprint-plan
  vertical-slice: gate-check

  story-readiness: dev-story
  team-combat: dev-story
  team-level: dev-story
  team-narrative: dev-story

  test-evidence-review: story-done
  tech-debt: code-review
  perf-profile: code-review
  security-audit: code-review

  qa-plan: smoke-check
  regression-suite: smoke-check
  test-setup: setup-engine
  test-helpers: smoke-check
  test-flakiness: smoke-check
  playtest-report: smoke-check
  soak-test: smoke-check
  team-qa: smoke-check
  team-polish: smoke-check

  bug-triage: bug-report
  hotfix: bug-report

  milestone-review: gate-check

  changelog: release-checklist
  patch-notes: release-checklist
  launch-checklist: release-checklist
  day-one-patch: release-checklist
  localize: release-checklist
  team-release: release-checklist
  team-live-ops: release-checklist

notes:
  - "alias_routes 只是旧命令名到核心 Skill 的路由标签，不是旧 Skill 内容引用。旧 Skill 的有效内容必须抽取到核心 Skill 主体或 references/；抽取完成的旧 Skill 应从 archive 删除。"
  - "发布版本应删除临时瘦身文档和临时归档目录。"
